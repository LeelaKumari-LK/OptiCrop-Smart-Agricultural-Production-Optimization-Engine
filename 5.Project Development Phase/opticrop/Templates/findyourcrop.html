<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OptiCrop - Find Your Crop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-image: url("{{ url_for('static', filename='images/findyourcrop_bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

        }
        .topnav {
            background-color: #2e7d32;
            overflow: hidden;
        }
        .topnav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 17px;
        }
        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }
        .topnav a.active {
            background-color: #1b5e20;
            color: white;

        }
        .content {
            padding: 30px;
            margin: 20px;

            border-radius: 10px
        }
        h2 {
            color: #2e7d32;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.85);
            
        }
        form {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #2e7d32;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #1b5e20;
        }
        .flask-output {
            text-align: center;
            font-size: 40px;
            color: #2e7d32;
            font-weight: bold;
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.99);
        }
    </style>
</head>
<body>
    <div class="topnav">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('about') }}">About</a>
        <a class="active" href="{{ url_for('findyourcrop') }}">FindYourCrop</a>
    </div>
    <div class="content">
        <h2>Find Your Best Crop</h2>
        <form action="{{ url_for('predict') }}" method="post">
            <label for="nitrogen">Nitrogen:</label>
            <input type="text" id="nitrogen" name="nitrogen" placeholder="e.g. 90" required="required"/>

            <label for="phosphorous">Phosphorous:</label>
            <input type="text" id="phosphorous" name="phosphorous" placeholder="e.g. 42" required="required"/>

            <label for="potassium">Potassium:</label>
            <input type="text" id="potassium" name="potassium" placeholder="e.g. 43" required="required"/>

            <label for="temperature">Temperature:</label>
            <input type="text" id="temperature" name="temperature" placeholder="e.g. 20.8" required="required"/>

            <label for="humidity">Humidity:</label>
            <input type="text" id="humidity" name="humidity" placeholder="e.g. 82.0" required="required"/>

            <label for="ph">pH:</label>
            <input type="text" id="ph" name="ph" placeholder="e.g. 6.5" required="required"/>

            <label for="rainfall">Rainfall:</label>
            <input type="text" id="rainfall" name="rainfall" placeholder="e.g. 202.9" required="required"/>

            <button type="submit">Predict</button>
        </form>
        <h3>
            <p class="flask-output">{{ prediction_text }}</p>
        </h3>
    </div>
</body>
</html>
